services:
  - type: web
    name: shelf-control
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shelf-control-db
          property: connectionString

databases:
  - name: shelf-control-db
    databaseName: shelf_control
    user: shelf_user
    plan: free
